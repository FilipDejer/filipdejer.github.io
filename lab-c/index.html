<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Filip Dejer 57727 - PTW LAB C</title>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <link rel="stylesheet" href="leaflet-1.9.4/leaflet.css" />
    <script src="scripts.js" defer></script>
    <script src="leaflet-1.9.4/leaflet-src.js"></script>
    <script src="leaflet-1.9.4/leaflet-providers.js"></script>
    <script src="leaflet-1.9.4/leaflet-image.js"></script>
</head>
<body>
    <div class="containers-wrapper">
        <div class="container">
            <div id="map"></div>
        </div>
        <div class="container">
            <canvas id="rasterMap" width="400" height="400"></canvas>
        </div>
        <div class="container" id="puzzleContainer"></div>
        <div class="drag-target" id="dragContainer"></div>
        <button id="getLocation" onclick="getLocation()">Get Location</button>
        <button id="saveButton">Save Raster Map</button>
        <br>



        <div id="positionInfo">
            <strong>Latitude:</strong> <span id="latitude"></span><br>
            <strong>Longitude:</strong> <span id="longitude"></span><br>
        </div>
    </div>
</body>
</html>
